<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Poro Draft — 팀장 투표 & 스네이크 드래프트</title>
<link rel="icon" href="/favicon.png" type="image/png" />
<style>
  :root {
    --bg: #0f1420;
    --panel: #182031;
    --panel2: #202b40;
    --line: #2c3852;
    --text: #e7ecf5;
    --muted: #93a1bd;
    --blue: #3d7bff;
    --red: #ff5468;
    --gold: #f6c445;
    --green: #35d07f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2740, var(--bg));
    color: var(--text);
    min-height: 100vh;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 24px 16px 60px; }
  .hero { display: block; width: 100%; max-width: 240px; margin: 4px auto 6px; border-radius: 18px; border: 1px solid var(--line); box-shadow: 0 10px 34px rgba(0,0,0,.4); }
  .sep { height: 1px; background: var(--line); margin: 16px 0; }
  h1 { font-size: 28px; letter-spacing: .5px; margin: 6px 0 18px; text-align: center; }
  .sub { text-align: center; color: var(--muted); margin-bottom: 20px; font-size: 14px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--panel2); color: var(--text); font-size: 15px; margin-bottom: 14px;
  }
  button {
    cursor: pointer; border: none; border-radius: 10px; padding: 12px 18px;
    font-size: 15px; font-weight: 600; color: #fff; background: var(--blue);
    transition: filter .15s, opacity .15s;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button.ghost { background: transparent; border: 1px solid var(--line); color: var(--muted); }
  button.gold { background: var(--gold); color: #23262e; }
  button.red { background: var(--red); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .grid { display: flex; flex-direction: column; gap: 10px; }
  .pill {
    background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .pill .name { font-weight: 600; display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
  .pill .name .tag, .pill .name .dot { flex-shrink: 0; }
  .pname { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .tag { font-size: 11px; padding: 2px 7px; border-radius: 999px; font-weight: 700; white-space: nowrap; }
  /* 방 목록: 한 줄에 하나씩 꽉 차게 */
  .roomlist { display: flex; flex-direction: column; gap: 10px; }
  .roomlist .name { min-width: 0; flex: 1; overflow: hidden; }
  .roomlist .rc { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .roomlist .tag { flex-shrink: 0; }
  .roomlist button { white-space: nowrap; flex-shrink: 0; padding: 10px 16px; }
  .tag.host { background: #3a2f00; color: var(--gold); }
  .tag.you { background: #10314f; color: #7db4ff; }
  .tag.off { background: #3a1f24; color: #ff8a97; }
  .tag.voted { background: #123524; color: #7ff0b5; }
  .tag.notvoted { background: #2a3346; color: #93a1bd; }
  .tag.dev { background: #22304a; color: #a9c2e8; }
  /* 실시간 연결 표시등 (우상단 고정) */
  .conn { position: fixed; top: 10px; right: 10px; z-index: 50; display: flex; align-items: center; gap: 7px;
    font-size: 12px; font-weight: 700; padding: 6px 11px; border-radius: 999px; border: 1px solid var(--line);
    background: rgba(24,32,49,.92); }
  .conn.ok { color: #7ff0b5; }
  .conn.bad { color: #ffcf8a; }
  .cdot { width: 9px; height: 9px; border-radius: 50%; background: #35d07f; flex-shrink: 0; }
  .conn.bad .cdot { background: var(--gold); }
  .cdot.beat { animation: beat .55s ease; }
  @keyframes beat {
    0%   { transform: scale(1);   box-shadow: 0 0 0 0 rgba(53,208,127,.6); }
    50%  { transform: scale(1.7); }
    100% { transform: scale(1);   box-shadow: 0 0 0 9px rgba(53,208,127,0); }
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }
  .dot.off { background: #5b6577; }
  .votebadge { font-size: 12px; color: var(--muted); }
  .selectable { cursor: pointer; }
  .selectable:hover { border-color: var(--blue); }
  .banner { text-align: center; padding: 14px; border-radius: 10px; margin-bottom: 16px; font-weight: 600; }
  .banner.blue { background: #12294d; color: #9cc2ff; }
  .banner.turn { background: #133524; color: #7ff0b5; }
  .banner.off { background: #3a2a12; color: #ffcf8a; }
  .teams { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; margin: 16px 0 12px; }
  .team { border-radius: 12px; padding: 12px 12px 8px; border: 1px solid var(--line); }
  .team.t0 { background: linear-gradient(180deg, #10233f, var(--panel)); border-color: #274a86; }
  .team.t1 { background: linear-gradient(180deg, #3a1620, var(--panel)); border-color: #7a2f3c; }
  .team h3 { margin: 0 0 10px; display: flex; align-items: center; gap: 8px; }
  .team .member { padding: 8px 10px; background: rgba(255,255,255,.04); border-radius: 8px; margin-bottom: 6px; display:flex; justify-content:space-between; gap: 6px; }
  .team .member:last-child { margin-bottom: 0; }
  .team .member > span { min-width: 0; overflow: hidden; display: flex; align-items: center; gap: 4px; }
  .step { display: flex; gap: 6px; justify-content: center; margin: 4px 0 16px; flex-wrap: wrap; }
  .step span { font-size: 12px; color: var(--muted); padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line); }
  .step span.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .hint { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .err { color: var(--red); font-size: 13px; min-height: 18px; text-align: center; }
  .schedule { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-top:10px; }
  .schedule .slot { width: 30px; height: 30px; border-radius: 8px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; border:1px solid var(--line); background: var(--panel2); }
  .schedule .slot.s0 { border-color:#274a86; }
  .schedule .slot.s1 { border-color:#7a2f3c; }
  .schedule .slot.done0 { background:#1a3a6b; }
  .schedule .slot.done1 { background:#6b1f2c; }
  .schedule .slot.now { outline: 2px solid var(--gold); }
  /* 팀장 공개(reveal) */
  .reveal { text-align:center; padding: 10px 0 4px; }
  .reveal .who { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin: 14px 0; }
  .reveal .who .card2 { flex:1; min-width: 140px; max-width: 260px; border-radius:14px; padding:18px; border:1px solid var(--line); }
  .reveal .who .a { background: linear-gradient(180deg, #10233f, var(--panel)); border-color:#274a86; }
  .reveal .who .b { background: linear-gradient(180deg, #3a1620, var(--panel)); border-color:#7a2f3c; }
  .reveal .who .lname { font-size: 22px; font-weight: 800; margin-top: 6px; word-break: keep-all; }
  /* 투표: 큰 남은시간 타이머 */
  .votetimer { text-align:center; margin: 4px 0 12px; line-height: 1; }
  .votetimer .vt-label { display:block; font-size: 12px; color: var(--muted); margin-bottom: 2px; font-weight:700; letter-spacing:.5px; }
  .votetimer .vt-num { font-size: 60px; font-weight: 900; color: var(--gold); font-variant-numeric: tabular-nums; }
  .votetimer .vt-unit { font-size: 20px; color: var(--muted); margin-left: 4px; }
  .votetimer .vt-num.low { color: var(--red); }
  /* 투표 상단 1·2위 요약 */
  .rank2 .who { margin: 6px 0 4px; }
  .rank2 .card2 { padding: 14px; }
  .rank2 .lname { font-size: 20px; }
</style>
</head>
<body>
<div id="connBadge" class="conn"><span class="cdot" id="cdot"></span><span id="cText">연결 확인 중…</span></div>
<div class="wrap">
  <img class="hero" src="/poro.png" alt="포로단" />
  <h1>Poro Draft</h1>
  <div class="err" id="err"></div>

  <!-- 참여 화면 -->
  <div class="card" id="joinCard">
    <label>열려있는 방 (실시간)</label>
    <div id="roomList" class="roomlist"></div>
    <div class="hint" style="margin:8px 0 2px">방을 눌러 바로 참여하거나, 아래에서 새 방을 만드세요.</div>
    <div class="sep"></div>
    <label>내 이름</label>
    <input id="nameInput" placeholder="닉네임" maxlength="20" />
    <label>방 코드 (새로 만들거나 직접 입력해 참여)</label>
    <div class="row">
      <input id="roomInput" placeholder="예: poro" maxlength="24" style="flex:1;margin-bottom:0" />
      <button id="joinBtn">참여 / 만들기</button>
    </div>
    <div class="hint">10명이 모이면 방장이 시작할 수 있어요.</div>
  </div>

  <!-- 게임 화면 -->
  <div id="app" style="display:none;">
    <div class="step" id="steps"></div>
    <div id="phaseArea"></div>
  </div>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const DEVICE = /Mobi|Android|iPhone|iPad|iPod|Windows Phone/i.test(navigator.userAgent) ? 'M' : 'PC';

  let selfId = null;
  let token = localStorage.getItem('poro_token') || null;
  let roomCode = localStorage.getItem('poro_room') || null;
  let joined = false;

  let lastRoom = null;
  let renderedRev = -1;   // 마지막으로 화면에 그린 상태 rev
  let lobbyRev = 0;       // 마지막으로 받은 방 목록 rev
  let lastOkAt = 0;       // 마지막으로 성공한 폴링 시각 (연결 표시등용)

  const STATE_MS = 1200;  // 게임 중 상태 폴링 주기
  const LOBBY_MS = 1500;  // 참여 화면 방 목록 폴링 주기

  const err = $('err');
  function showErr(m) { err.textContent = m; setTimeout(() => { if (err.textContent === m) err.textContent = ''; }, 3500); }

  // ---- HTTP 헬퍼 ----
  async function apiGet(url) {
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error('http ' + r.status);
    return r.json();
  }
  async function apiPost(url, body) {
    const r = await fetch(url, {
      method: 'POST', cache: 'no-store',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error('http ' + r.status);
    return r.json();
  }

  function markOk() {
    lastOkAt = Date.now();
    const d = $('cdot');
    if (d) { d.classList.remove('beat'); void d.offsetWidth; d.classList.add('beat'); }
    updateConnBadge();
  }
  function updateConnBadge() {
    const el = $('connBadge'); if (!el) return;
    const fresh = Date.now() - lastOkAt < 4000;
    if (fresh) { el.className = 'conn ok'; $('cText').textContent = '실시간 연결됨'; }
    else { el.className = 'conn bad'; $('cText').textContent = '재연결 중…'; }
  }
  setInterval(updateConnBadge, 1000);

  // ---- 화면 전환 ----
  function showJoinScreen() {
    joined = false;
    $('joinCard').style.display = 'block';
    $('app').style.display = 'none';
  }
  function showGameScreen() {
    joined = true;
    $('joinCard').style.display = 'none';
    $('app').style.display = 'block';
  }

  // ---- 상태 폴링 ----
  let statePolling = false;
  async function pollState() {
    if (!joined || !roomCode || !token || statePolling) return;
    statePolling = true;
    try {
      const data = await apiGet(`/api/state?room=${encodeURIComponent(roomCode)}&token=${encodeURIComponent(token)}&rev=${renderedRev}`);
      markOk();
      if (data.gone) { // 자리가 사라짐 → 참여 화면으로
        localStorage.removeItem('poro_room');
        roomCode = null; joined = false; renderedRev = -1;
        showJoinScreen();
        return;
      }
      if (data.unchanged) return;
      if (data.room) {
        lastRoom = data.room;
        renderedRev = data.rev;
        render(data.room);
      }
    } catch (e) {
      updateConnBadge();
    } finally {
      statePolling = false;
    }
  }

  // ---- 방 목록 폴링 ----
  let lobbyPolling = false;
  async function pollLobby() {
    if (joined || lobbyPolling) return;
    lobbyPolling = true;
    try {
      const data = await apiGet(`/api/lobby?rev=${lobbyRev}`);
      markOk();
      if (data.unchanged) return;
      lobbyRev = data.rev;
      renderRoomList(data.rooms);
    } catch (e) {
      updateConnBadge();
    } finally {
      lobbyPolling = false;
    }
  }

  setInterval(pollState, STATE_MS);
  setInterval(pollLobby, LOBBY_MS);

  // 탭이 다시 보이면 즉시 갱신
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    if (joined) pollState(); else pollLobby();
  });

  // 투표/공개 카운트다운을 매초 갱신 (서버 시각 기준)
  setInterval(() => {
    if (!lastRoom) return;
    const vt = $('voteTimer');
    if (vt && lastRoom.phase === 'voting' && lastRoom.votingEndsAt) {
      const s = Math.max(0, Math.min(99, Math.ceil((lastRoom.votingEndsAt - Date.now()) / 1000)));
      vt.textContent = s;
      vt.classList.toggle('low', s <= 5);
    }
    const rt = $('revealTimer');
    if (rt && lastRoom.phase === 'reveal' && lastRoom.revealEndsAt) {
      rt.textContent = Math.max(0, Math.ceil((lastRoom.revealEndsAt - Date.now()) / 1000));
    }
  }, 250);

  // ---- 참여 / 액션 ----
  async function doJoin(room, name) {
    if (!room) return showErr('방 코드를 입력해 주세요.');
    if (!name) return showErr('이름을 입력해 주세요.');
    localStorage.setItem('poro_name', name);
    try {
      const data = await apiPost('/api/join', { room, name, token, device: DEVICE });
      markOk();
      if (data.error) return showErr(data.error);
      selfId = data.selfId;
      token = data.token;
      roomCode = data.code;
      renderedRev = -1;
      localStorage.setItem('poro_token', token);
      localStorage.setItem('poro_room', roomCode);
      showGameScreen();
      pollState();
    } catch (e) {
      showErr('참여에 실패했어요. 잠시 후 다시 시도해 주세요.');
    }
  }

  async function doAction(type, extra) {
    try {
      const data = await apiPost('/api/action', Object.assign({ room: roomCode, token, type }, extra || {}));
      markOk();
      if (data.error) return showErr(data.error);
      pollState();
    } catch (e) {
      showErr('요청에 실패했어요. 다시 시도해 주세요.');
    }
  }

  $('joinBtn').onclick = () => doJoin($('roomInput').value.trim(), $('nameInput').value.trim());
  $('nameInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('joinBtn').click(); });
  $('roomInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('joinBtn').click(); });

  // ---- 시작: 저장된 세션이 있으면 저장된 토큰으로 재접속 시도 ----
  (async () => {
    if (roomCode && token) {
      try {
        const rj = await apiPost('/api/join', { room: roomCode, name: localStorage.getItem('poro_name') || '', token, device: DEVICE });
        markOk();
        if (rj.ok) {
          selfId = rj.selfId; token = rj.token; roomCode = rj.code; renderedRev = -1;
          localStorage.setItem('poro_token', token);
          localStorage.setItem('poro_room', roomCode);
          showGameScreen();
          pollState();
          return;
        }
      } catch (e) {}
    }
    showJoinScreen();
    pollLobby();
  })();

  // ================= 렌더링 =================
  const PICK_ORDER = [0,1,1,0,0,1,1,0];
  const PHASES = { lobby:'대기실', voting:'투표', reveal:'팀장확정', draft:'드래프트', result:'결과' };

  function render(room) {
    $('steps').innerHTML = ['lobby','voting','draft','result'].map(p => {
      const active = room.phase === p || (p === 'voting' && room.phase === 'reveal');
      return `<span class="${active?'active':''}">${PHASES[p]}</span>`;
    }).join('');

    const area = $('phaseArea');
    if (room.phase === 'lobby') area.innerHTML = renderLobby(room);
    else if (room.phase === 'voting') area.innerHTML = renderVoting(room);
    else if (room.phase === 'reveal') area.innerHTML = renderReveal(room);
    else if (room.phase === 'draft') area.innerHTML = renderDraft(room);
    else if (room.phase === 'result') area.innerHTML = renderResult(room);

    bindActions(room);
  }

  function nameOf(room, id) { const p = room.players.find(x=>x.id===id); return p ? p.name : '?'; }
  function tags(room, p) {
    let t = '';
    if (p.device) t += `<span class="tag dev">${p.device === 'M' ? '📱 M' : '💻 PC'}</span>`;
    if (p.id === room.hostId) t += '<span class="tag host">방장</span>';
    if (p.id === selfId) t += '<span class="tag you">나</span>';
    if (!p.connected) t += '<span class="tag off">오프라인</span>';
    return t;
  }

  function renderLobby(room) {
    const isHost = room.hostId === selfId;
    const full = room.players.length === room.target;
    const list = room.players.map(p => `
      <div class="pill">
        <span class="name"><span class="dot ${p.connected?'':'off'}"></span><span class="pname">${escapeHtml(p.name)}</span> ${tags(room,p)}</span>
      </div>`).join('');
    return `
      <div class="card">
        <div class="row" style="justify-content:space-between">
          <div><b>방 코드:</b> <span style="color:var(--gold)">${escapeHtml(room.code)}</span></div>
          <div class="votebadge">${room.players.length} / ${room.target} 명</div>
        </div>
        <div class="hint">친구들에게 이 방 코드를 알려주세요. ${room.target}명이 모이면 시작합니다.</div>
      </div>
      <div class="card">
        <div class="grid">${list || '<div class="hint">아직 아무도 없어요.</div>'}</div>
      </div>
      <div class="card row" style="justify-content:space-between">
        <button class="ghost" data-act="leave">방 나가기</button>
        ${isHost
          ? `<button class="gold" data-act="start" ${full?'':'disabled'}>${full?'투표 시작':'10명 대기 중...'}</button>`
          : `<span class="hint">방장이 시작하기를 기다리는 중...</span>`}
      </div>`;
  }

  function voteRemain(room) {
    if (!room.votingEndsAt) return null;
    return Math.max(0, Math.min(99, Math.ceil((room.votingEndsAt - Date.now()) / 1000)));
  }

  function renderVoting(room) {
    const myVote = room.votes[selfId];
    const remain = voteRemain(room);
    const low = remain != null && remain <= 5;

    // 현재 1·2위 (동점이면 먼저 들어온 순) — 상단 요약. 이 부분만 실시간으로 바뀐다.
    const ranked = room.players.slice().sort((a,b) => (b.votes - a.votes) || (a.joinIndex - b.joinIndex));
    const topCards = ranked.slice(0, 2).map((p, i) => `
      <div class="card2 ${i===0?'a':'b'}">
        <div class="votebadge">${i===0?'🥇 현재 1위':'🥈 현재 2위'} · ${p.votes}표</div>
        <div class="lname">${escapeHtml(p.name)}</div>
      </div>`).join('');

    // 전체 리스트: 입장 순 고정(정렬하지 않음) → 표가 들어와도 행 위치가 바뀌지 않음
    const list = room.players.map(p => {
      const mine = myVote === p.id;
      const isSelf = p.id === selfId;
      const hasVoted = !!room.votes[p.id];
      const voteTag = hasVoted
        ? '<span class="tag voted">투표함</span>'
        : '<span class="tag notvoted">미투표</span>';
      return `
        <div class="pill ${isSelf?'':'selectable'}" ${isSelf?'':`data-vote="${p.id}"`}
             style="${mine?'border-color:var(--gold)':''}">
          <span class="name"><span class="dot ${p.connected?'':'off'}"></span><span class="pname">${escapeHtml(p.name)}</span> ${tags(room,p)} ${voteTag}</span>
          <span class="votebadge">${p.votes}표 ${mine?'✅':''}</span>
        </div>`;
    }).join('');

    return `
      <div class="votetimer">
        <span class="vt-label">남은 시간</span>
        <span class="vt-num ${low?'low':''}" id="voteTimer">${remain ?? '-'}</span><span class="vt-unit">초</span>
      </div>
      <div class="banner blue" style="margin-bottom:12px">팀장이 될 사람에게 투표하세요! 최다 득표 2명이 팀장이 됩니다.</div>
      <div class="reveal rank2"><div class="who">${topCards}</div></div>
      <div class="card">
        <div class="row" style="justify-content:space-between;margin-bottom:10px">
          <span class="votebadge">투표 완료 ${room.votedCount} / ${room.players.length}</span>
          <span class="votebadge">${myVote ? '나의 선택: '+escapeHtml(nameOf(room,myVote)) : '아직 투표 안 함'}</span>
        </div>
        <div class="grid">${list}</div>
        <div class="hint">제한시간이 끝나면 현재 득표 기준으로 팀장이 확정돼요. 마감 전까지 자유롭게 바꿔 찍을 수 있어요. (자신에게는 투표 불가)</div>
      </div>`;
  }

  function renderReveal(room) {
    const remain = room.revealEndsAt ? Math.max(0, Math.ceil((room.revealEndsAt - Date.now())/1000)) : 0;
    const a = nameOf(room, room.leaders[0]);
    const b = nameOf(room, room.leaders[1]);
    const ca = (voteCountOf(room, room.leaders[0]));
    const cb = (voteCountOf(room, room.leaders[1]));
    return `
      <div class="banner turn">🎉 팀장이 확정되었습니다!</div>
      <div class="card reveal">
        <div class="who">
          <div class="card2 a"><div class="votebadge">🅐 팀장 · ${ca}표</div><div class="lname">${escapeHtml(a)}</div></div>
          <div class="card2 b"><div class="votebadge">🅑 팀장 · ${cb}표</div><div class="lname">${escapeHtml(b)}</div></div>
        </div>
        <div class="hint"><b id="revealTimer">${remain}</b>초 후 드래프트가 시작됩니다…</div>
      </div>`;
  }
  function voteCountOf(room, id) { const p = room.players.find(x=>x.id===id); return p ? p.votes : 0; }

  function scheduleBar(room) {
    return `<div class="schedule">` + PICK_ORDER.map((s,i)=>{
      let cls = 's'+s;
      if (i < room.turnIndex) cls += ' done'+s;
      if (i === room.turnIndex) cls += ' now';
      return `<div class="slot ${cls}">${s===0?'A':'B'}</div>`;
    }).join('') + `</div>`;
  }

  function renderDraft(room) {
    const pickerId = room.currentPickerId;
    const myTurn = pickerId === selfId;
    const picker = room.players.find(p => p.id === pickerId);
    const pickerOffline = picker && !picker.connected;
    const available = room.players.filter(p => !p.role);
    const avail = available.map(p => `
      <div class="pill ${myTurn?'selectable':''}" ${myTurn?`data-pick="${p.id}"`:''}>
        <span class="name"><span class="dot ${p.connected?'':'off'}"></span><span class="pname">${escapeHtml(p.name)}</span> ${tags(room,p)}</span>
        ${myTurn?'<span class="votebadge">뽑기 →</span>':''}
      </div>`).join('');

    const banner = myTurn
      ? `<div class="banner turn">🎯 당신(${escapeHtml(nameOf(room,selfId))}) 차례입니다! 팀원을 한 명 뽑으세요.</div>`
      : pickerOffline
        ? `<div class="banner off">⚠️ ${escapeHtml(nameOf(room, pickerId))} 팀장이 오프라인입니다. 잠시 후 자동으로 뽑습니다... (${room.turnIndex+1}/${room.totalPicks})</div>`
        : `<div class="banner blue">${escapeHtml(nameOf(room, pickerId))} 팀장이 뽑는 중... (${room.turnIndex+1}/${room.totalPicks})</div>`;

    return `
      ${banner}
      ${scheduleBar(room)}
      ${teamsView(room)}
      <div class="card">
        <h3 style="margin-top:0">남은 선수 (${available.length})</h3>
        <div class="grid">${avail || '<div class="hint">남은 선수가 없어요.</div>'}</div>
      </div>`;
  }

  function teamsView(room) {
    const t0 = room.players.filter(p => p.team === 0);
    const t1 = room.players.filter(p => p.team === 1);
    const memb = (arr) => arr.map(p => `
      <div class="member">
        <span>${p.role==='leader'?'👑 ':''}<span class="pname">${escapeHtml(p.name)}</span> ${p.id===selfId?'<span class="tag you">나</span>':''}</span>
      </div>`).join('') || '<div class="hint">아직 없음</div>';
    return `
      <div class="teams">
        <div class="team t0"><h3>🅐 ${escapeHtml(nameOf(room,room.leaders[0]))} 팀 <span class="votebadge">(${t0.length})</span></h3>${memb(t0)}</div>
        <div class="team t1"><h3>🅑 ${escapeHtml(nameOf(room,room.leaders[1]))} 팀 <span class="votebadge">(${t1.length})</span></h3>${memb(t1)}</div>
      </div>`;
  }

  function renderResult(room) {
    const isHost = room.hostId === selfId;
    return `
      <div class="banner turn">🎉 팀 구성 완료!</div>
      ${teamsView(room)}
      <div class="card row" style="justify-content:center">
        ${isHost ? '<button class="gold" data-act="reset">대기실로 (다시 하기)</button>'
                 : '<span class="hint">방장이 다시 시작하기를 기다리는 중...</span>'}
      </div>`;
  }

  function bindActions(room) {
    document.querySelectorAll('[data-act]').forEach(el => el.onclick = () => {
      const act = el.getAttribute('data-act');
      if (act === 'leave') {
        localStorage.removeItem('poro_room'); localStorage.removeItem('poro_token');
        doAction('leave');
        roomCode = null; token = null; joined = false;
        setTimeout(() => location.reload(), 150);
        return;
      }
      doAction(act);
    });
    document.querySelectorAll('[data-vote]').forEach(el => el.onclick = () =>
      doAction('vote', { targetId: el.getAttribute('data-vote') }));
    document.querySelectorAll('[data-pick]').forEach(el => el.onclick = () =>
      doAction('pick', { targetId: el.getAttribute('data-pick') }));
  }

  function renderRoomList(list) {
    const el = $('roomList');
    if (!list || !list.length) {
      el.innerHTML = '<div class="hint">아직 열린 방이 없어요. 아래에서 방 코드를 입력해 새로 만드세요.</div>';
      return;
    }
    el.innerHTML = list.map((r) => {
      const badge = r.phase === 'lobby'
        ? `<span class="tag you">대기중 ${r.connected}/${r.target}</span>`
        : `<span class="tag off">진행중</span>`;
      const btn = r.joinable
        ? `<button data-join="${escapeHtml(r.code)}">참여하기</button>`
        : `<button disabled>${r.phase === 'lobby' ? '만원' : '진행중'}</button>`;
      return `<div class="pill"><span class="name"><span class="rc">${escapeHtml(r.code)}</span> ${badge}</span>${btn}</div>`;
    }).join('');
    el.querySelectorAll('[data-join]').forEach((b) => b.onclick = () => {
      const code = b.getAttribute('data-join');
      const name = $('nameInput').value.trim();
      if (!name) { showErr('먼저 이름을 입력해 주세요.'); $('nameInput').focus(); return; }
      doJoin(code, name);
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
})();
</script>
</body>
</html>
